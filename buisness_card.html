<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="buisness card.css">
</head>
<body>
    <div >
  <div class="card">

    <div class="left">
      <p class="title">Your Result</p>

      <div class="circle">
        <h1>76</h1>
        <span>of 100</span>
      </div>
      <h2>Great</h2>
      <p class="desc">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </div>

    
    <div class="right">
      <h3>Summary</h3>

      <div class="item reaction">
        <span>Reaction</span>
        <span><b>80</b> / 100</span>
      </div>

      <div class="item memory">
        <span>Memory</span>
        <span><b>92</b> / 100</span>
      </div>

      <div class="item verbal">
        <span>Verbal</span>
        <span><b>61</b> / 100</span>
      </div>
      <div class="item visual">
        <span>Visual</span>
        <span><b>73</b> / 100</span>
      </div>
      <button>Continue</button>
    </div>

  </div>
</div>



</body>
</html>
