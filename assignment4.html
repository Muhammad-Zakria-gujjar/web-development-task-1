<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assignment4.css">
</head>
<body>
  <div class="photbc">

    <div class="form-card">
      <h2>Student Registration</h2>

      <form>

        <div class="input-group">
          <label>Name</label>
          <input type="text" placeholder="Enter your name">
        </div>

        <div class="input-group">
          <label>CNIC / B-Form</label>
          <input type="text" placeholder="Enter CNIC">
        </div>

        <div class="input-group">
          <label>Father Name</label>
          <input type="text" placeholder="Enter father name">
        </div>

        <div class="input-group">
          <label>Father CNIC</label>
          <input type="text" placeholder="Enter father CNIC">
        </div>

        <div class="input-group">
          <label>Address</label>
          <textarea rows="3" placeholder="Enter address"></textarea>
        </div>

        <div class="input-group">
          <label>Portal Number</label>
          <input type="text" placeholder="Enter portal number">
        </div>

        <div class="input-group">
          <label>City</label>
          <select>
            <option>Choose city</option>
            <option>Lahore</option>
            <option>Karachi</option>
          </select>
        </div>

        <div class="input-group">
          <label>Course</label>
          <div class="radio-group">
            <label><input type="radio" name="course"> BS</label>
            <label><input type="radio" name="course"> CS</label>
          </div>
        </div>

        <button type="submit">Submit</button>

      </form>
    </div>

  </div>
</body>
</html>
